<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta -->
    <meta name="theme-color" content="#080C16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinanceOS" />

    <!-- SEO -->
    <meta name="description" content="Your AI-powered financial command center. Spend wisely, save consistently, invest intelligently, give generously." />

    <!-- Open Graph -->
    <meta property="og:title" content="FinanceOS" />
    <meta property="og:description" content="Your AI-powered financial command center" />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>FinanceOS</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #080C16;
        color: #E2E8F0;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
      }
      /* Safe area padding for notched phones */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
